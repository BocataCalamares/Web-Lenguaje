<body>
<form action="/matricula" method="post">
    <fieldset>
        <legend>Matricula</legend>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan Pérez">
    <label for="email">Correo Electrónico:</label>
    <input type="email" id="email" name="email" required placeholder="tucorreo@ejemplo.com"><br>
    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password">
    <label for="fecha_nac">Fecha de Nacimiento:</label>
    <input type="date" id="fecha_nac" name="fecha_nac"><br>
    <select name="curso">
        <option value="DM">DAM</option>
        <option value="DW">DAW</option>
        <option value="AX">ASIX</option>
    </select>
        <br>
    <input type="checkbox" id="aceptar">
    <label for="aceptar">Acepto las politicas de privacidad</label><br>

    <button type="submit">Matricula</button>
    </fieldset>
</form>
</body>
